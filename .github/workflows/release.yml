name: Release

on:
  push:
    branches: [main]

# Need write permissions to open the version-bump PR and to publish.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Write the publish auth directly so neither setup-node's
      # interpolated .npmrc nor pnpm's quirks can lose it.
      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      # The action either:
      #   - Opens / updates a "Version Packages" PR if there are pending
      #     changesets in .changeset/, or
      #   - Runs `pnpm release` (build + publish) if the version PR was
      #     just merged and the new version isn't on npm yet.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
