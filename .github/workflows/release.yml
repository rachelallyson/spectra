name: Release

on:
  push:
    branches: [main]

# Need write permissions to open the version-bump PR and to publish.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # The action either:
      #   - Opens / updates a "Version Packages" PR if there are pending
      #     changesets in .changeset/, or
      #   - Runs `pnpm release` (build + publish) if the version PR was
      #     just merged and the new version isn't on npm yet.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The changesets action checks `NPM_TOKEN`; npm itself reads
          # `NODE_AUTH_TOKEN` from the .npmrc that setup-node generated.
          # Set both from the same secret.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
